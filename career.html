    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Google tag (gtag.js) -->

    <script>

        gtag('config', 'G-PN1ZE9F58P');

</head>

<body class="bg-light">


    <!-- Navbar (same as index.html) -->
    <nav id="mainNav" class="navbar navbar-expand-lg navbar-light bg-white sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="assets/img/logo.png" alt="Logo" class="me-2 oval-logo" onerror="this.style.display='none'">
                Adi<span style="color: var(--accent);">Technosoft</span>
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item"><a class="nav-link " href="index.html"><span class="trn" data-en="Home"
                                data-or="ହୋମ୍">Home</span></a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="about.html"><span class="trn" data-en="About"
                                data-or="ଆମ ବିଷୟରେ">About</span></a></li> -->
                    <li class="nav-item"><a class="nav-link " href="services.html"><span class="trn" data-en="Services"
                                data-or="ସେବା">Services</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="pricing.html"><span class="trn" data-en="Pricing"
                                data-or="ମୂଲ୍ୟ">Pricing</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html"><span class="trn" data-en="Projects"
                                data-or="ପ୍ରୋଜେକ୍ଟ">Projects</span></a></li>
                    <li class="nav-item"><a class="nav-link active" href="career.html"><span class="trn"
                                data-en="Career" data-or="ଆମ ସହିତ ଯୋଗ ଦିଅ">Career</span></a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html"><span class="trn" data-en="Contact"
                                data-or="ଯୋଗାଯୋଗ">Contact</span></a></li>


                    <li class="nav-item mt-3 mt-lg-0">


                        <div class="lang-toggle">
                            <button class="lang-btn active" data-lang="en">ENG</button>
                            <button class="lang-btn" data-lang="or">ଓଡ଼ିଆ</button>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>


    <!-- HERO -->
    <section class="hero-section text-center">
        <div class="container">
            <h1 class="hero-title">Join Our <span>Team</span></h1>
            <p class="mt-3">We are looking for talented people 🚀</p>
            <a href="#apply" class="btn btn-custom-accent mt-3">Apply Now</a>
        </div>
    </section>

    <!-- APPLY FORM -->
    <section id="apply" class="pricing-section">
        <div class="container">
            <h2 class="section-title text-center">Apply Now</h2>

            <div class="row justify-content-center mt-4">
                <div class="col-lg-6">
                    <div class="bg-white p-4 shadow rounded">
                        <form id="careerForm">

                            <div class="mb-3">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Position</label>
                                <select class="form-select" required>
                                    <option>Select</option>
                                    <option>Frontend Developer</option>
                                    <option>Backend Developer</option>
                                    <option>Designer</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Resume</label>
                                <input type="file" class="form-control">
                            </div>

                            <button type="submit" class="btn btn-custom-accent w-100">Submit Application</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- SUCCESS MODAL -->
    <div class="modal fade" id="applyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <h4>Application Submitted 🎉</h4>
                <p>We will contact you soon.</p>
                <button class="btn btn-primary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Simple form handler
        const form = document.getElementById('careerForm');
        form.addEventListener('submit', function (e) {
            e.preventDefault();
            const modal = new bootstrap.Modal(document.getElementById('applyModal'));
            modal.show();
            form.reset();
        });
    </script>

</body>

</html>
